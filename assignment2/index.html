<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yearly Data</title>
</head>

<body>
    <header>
        <h1>US Population by Year</h1>
    </header>
    <div>
        <table id="year-list">
            <thead>
                <tr>
                    <th>Year</th>
                    <th>Population</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <style>
        #year-list,
        #year-list th,
        #year-list td {
            border: 1px solid #000;
            border-collapse: collapse;
        }

        #year-list th,
        #year-list td {
            padding: 4px 8px;
            text-align: left;
        }
    </style>

    <script src="script.js"></script>
</body>

</html>
